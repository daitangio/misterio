name: Go

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.26"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Format check
        run: test -z "$(gofmt -l ./cmd ./internal)"
      - name: Test
        run: go test ./...
      - name: Build
        run: go build ./...
